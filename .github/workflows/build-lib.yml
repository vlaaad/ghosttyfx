name: Build libghostty-vt

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: ghostty-org/ghostty
          ref: 7421b4b13f87e101d4bbcedd4da84886ceae4e7b
          path: ghostty

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        run: |
          curl -fL "https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz" -o zig.tar.xz
          test "$(sha256sum zig.tar.xz | cut -d ' ' -f 1)" = "02aa270f183da276e5b5920b1dac44a63f1a49e55050ebde3aecc9eb82f93239"
          tar -xJf zig.tar.xz
          echo "${{ github.workspace }}/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true
          cd ../native/frame-snapshot
          zig build -Dghostty-root=../../ghostty

      - name: Package
        run: |
          rm -rf dist/platforms/libghostty-vt-linux-x86_64
          mkdir -p dist/platforms/libghostty-vt-linux-x86_64/lib
          test -f ghostty/zig-out/lib/libghostty-vt.so.0.1.0
          test -f native/frame-snapshot/zig-out/lib/libghosttyfx-frame.so
          cp ghostty/zig-out/lib/libghostty-vt.so.0.1.0 dist/platforms/libghostty-vt-linux-x86_64/lib/libghostty-vt-linux-x86_64.so
          cp native/frame-snapshot/zig-out/lib/libghosttyfx-frame.so dist/platforms/libghostty-vt-linux-x86_64/lib/libghosttyfx-frame-linux-x86_64.so

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-linux-x86_64 -am test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-linux-x86_64
          path: dist/platforms/libghostty-vt-linux-x86_64/
          retention-days: 1
          compression-level: 0

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: ghostty-org/ghostty
          ref: 7421b4b13f87e101d4bbcedd4da84886ceae4e7b
          path: ghostty

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        run: |
          curl -fL "https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz" -o zig.tar.xz
          test "$(shasum -a 256 zig.tar.xz | cut -d ' ' -f 1)" = "3cc2bab367e185cdfb27501c4b30b1b0653c28d9f73df8dc91488e66ece5fa6b"
          tar -xJf zig.tar.xz
          echo "${{ github.workspace }}/zig-aarch64-macos-0.15.2" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true
          cd ../native/frame-snapshot
          zig build -Dghostty-root=../../ghostty

      - name: Package
        run: |
          rm -rf dist/platforms/libghostty-vt-macos-aarch64
          mkdir -p dist/platforms/libghostty-vt-macos-aarch64/lib
          test -f ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib
          test -f native/frame-snapshot/zig-out/lib/libghosttyfx-frame.dylib
          cp ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib dist/platforms/libghostty-vt-macos-aarch64/lib/libghostty-vt-macos-aarch64.dylib
          cp native/frame-snapshot/zig-out/lib/libghosttyfx-frame.dylib dist/platforms/libghostty-vt-macos-aarch64/lib/libghosttyfx-frame-macos-aarch64.dylib

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-macos-aarch64 -am test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-macos-aarch64
          path: dist/platforms/libghostty-vt-macos-aarch64/
          retention-days: 1
          compression-level: 0

  build-macos-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: ghostty-org/ghostty
          ref: 7421b4b13f87e101d4bbcedd4da84886ceae4e7b
          path: ghostty

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        run: |
          curl -fL "https://ziglang.org/download/0.15.2/zig-x86_64-macos-0.15.2.tar.xz" -o zig.tar.xz
          test "$(shasum -a 256 zig.tar.xz | cut -d ' ' -f 1)" = "375b6909fc1495d16fc2c7db9538f707456bfc3373b14ee83fdd3e22b3d43f7f"
          tar -xJf zig.tar.xz
          echo "${{ github.workspace }}/zig-x86_64-macos-0.15.2" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true
          cd ../native/frame-snapshot
          zig build -Dghostty-root=../../ghostty

      - name: Package
        run: |
          rm -rf dist/platforms/libghostty-vt-macos-x86_64
          mkdir -p dist/platforms/libghostty-vt-macos-x86_64/lib
          test -f ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib
          test -f native/frame-snapshot/zig-out/lib/libghosttyfx-frame.dylib
          cp ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib dist/platforms/libghostty-vt-macos-x86_64/lib/libghostty-vt-macos-x86_64.dylib
          cp native/frame-snapshot/zig-out/lib/libghosttyfx-frame.dylib dist/platforms/libghostty-vt-macos-x86_64/lib/libghosttyfx-frame-macos-x86_64.dylib

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-macos-x86_64 -am test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-macos-x86_64
          path: dist/platforms/libghostty-vt-macos-x86_64/
          retention-days: 1
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    env:
      ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}\.zig-local-cache
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}\.zig-global-cache
      TEMP: ${{ github.workspace }}\.tmp
      TMP: ${{ github.workspace }}\.tmp
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1

      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          repository: ghostty-org/ghostty
          ref: 7421b4b13f87e101d4bbcedd4da84886ceae4e7b
          path: ghostty

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip" -OutFile zig.zip
          $actual = (Get-FileHash -Path "zig.zip" -Algorithm SHA256).Hash.ToLowerInvariant()
          if ($actual -ne "3a0ed1e8799a2f8ce2a6e6290a9ff22e6906f8227865911fb7ddedc3cc14cb0c") {
            throw "Expected Zig archive SHA-256 3a0ed1e8799a2f8ce2a6e6290a9ff22e6906f8227865911fb7ddedc3cc14cb0c, got $actual"
          }
          Expand-Archive -Path zig.zip -DestinationPath .
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\zig-x86_64-windows-0.15.2"

      - name: Prepare cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:ZIG_LOCAL_CACHE_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:ZIG_GLOBAL_CACHE_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:TEMP | Out-Null

      - name: Build
        shell: pwsh
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true
          cd ../native/frame-snapshot
          zig build -Dghostty-root=../../ghostty

      - name: Package
        shell: pwsh
        run: |
          if (-not (Test-Path "ghostty/zig-out/bin/ghostty-vt.dll")) {
            throw "Expected Windows shared library at ghostty/zig-out/bin/ghostty-vt.dll"
          }
          if (-not (Test-Path "native/frame-snapshot/zig-out/bin/ghosttyfx-frame.dll")) {
            throw "Expected Windows shim at native/frame-snapshot/zig-out/bin/ghosttyfx-frame.dll"
          }
          Remove-Item -Recurse -Force "dist/platforms/libghostty-vt-windows-x86_64" -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path "dist/platforms/libghostty-vt-windows-x86_64/lib" | Out-Null
          Copy-Item "ghostty/zig-out/bin/ghostty-vt.dll" "dist/platforms/libghostty-vt-windows-x86_64/lib/libghostty-vt-windows-x86_64.dll"
          Copy-Item "native/frame-snapshot/zig-out/bin/ghosttyfx-frame.dll" "dist/platforms/libghostty-vt-windows-x86_64/lib/libghosttyfx-frame-windows-x86_64.dll"

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-windows-x86_64 -am test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-windows-x86_64
          path: dist/platforms/libghostty-vt-windows-x86_64/
          retention-days: 1
          compression-level: 0
