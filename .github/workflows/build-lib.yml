name: Build libghostty-vt

on:
  push:
  pull_request:
  workflow_dispatch:

env:
  JEXTRACT_VERSION: 25-jextract+2-4
  JEXTRACT_DIRNAME: jextract-25

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz | tar xJ
          echo "${{ github.workspace }}/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH

      - name: Install jextract
        run: |
          curl -L -o jextract.tar.gz "https://download.java.net/java/early_access/jextract/25/2/openjdk-${{ env.JEXTRACT_VERSION }}_linux-x64_bin.tar.gz"
          tar -xzf jextract.tar.gz
          echo "${{ github.workspace }}/${{ env.JEXTRACT_DIRNAME }}/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Generate jextract bindings
        run: |
          mkdir -p ghostty/zig-out/artifact/linux-x86_64/src
          jextract \
            -I ghostty/zig-out/include \
            -t io.github.vlaaad.linux.x86_64 \
            --header-class-name ghostty_vt_h \
            --output ghostty/zig-out/artifact/linux-x86_64/src \
            ghostty/zig-out/include/ghostty/vt.h

      - name: Package
        run: |
          rm -rf dist/platforms/libghostty-vt-linux-x86_64
          mkdir -p dist/platforms/libghostty-vt-linux-x86_64/lib
          cp -R ghostty/zig-out/artifact/linux-x86_64/src dist/platforms/libghostty-vt-linux-x86_64/src
          test -f ghostty/zig-out/lib/libghostty-vt.so.0.1.0
          cp ghostty/zig-out/lib/libghostty-vt.so.0.1.0 dist/platforms/libghostty-vt-linux-x86_64/lib/libghostty-vt-linux-x86_64.so
          printf "jextract %s\n" "$(jextract --version | head -n 1)" > dist/platforms/libghostty-vt-linux-x86_64/metadata.txt

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-linux-x86_64 -am test

      - uses: actions/upload-artifact@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-linux-x86_64
          path: dist/platforms/libghostty-vt-linux-x86_64/
          retention-days: 1
          compression-level: 0

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz | tar xJ
          echo "${{ github.workspace }}/zig-aarch64-macos-0.15.2" >> $GITHUB_PATH

      - name: Install jextract
        run: |
          curl -L -o jextract.tar.gz "https://download.java.net/java/early_access/jextract/25/2/openjdk-${{ env.JEXTRACT_VERSION }}_macos-aarch64_bin.tar.gz"
          tar -xzf jextract.tar.gz
          echo "${{ github.workspace }}/${{ env.JEXTRACT_DIRNAME }}/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Generate jextract bindings
        run: |
          mkdir -p ghostty/zig-out/artifact/macos-aarch64/src
          jextract \
            -I ghostty/zig-out/include \
            -t io.github.vlaaad.macos.aarch64 \
            --header-class-name ghostty_vt_h \
            --output ghostty/zig-out/artifact/macos-aarch64/src \
            ghostty/zig-out/include/ghostty/vt.h

      - name: Package
        run: |
          rm -rf dist/platforms/libghostty-vt-macos-aarch64
          mkdir -p dist/platforms/libghostty-vt-macos-aarch64/lib
          cp -R ghostty/zig-out/artifact/macos-aarch64/src dist/platforms/libghostty-vt-macos-aarch64/src
          test -f ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib
          cp ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib dist/platforms/libghostty-vt-macos-aarch64/lib/libghostty-vt-macos-aarch64.dylib
          printf "jextract %s\n" "$(jextract --version | head -n 1)" > dist/platforms/libghostty-vt-macos-aarch64/metadata.txt

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-macos-aarch64 -am test

      - uses: actions/upload-artifact@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-macos-aarch64
          path: dist/platforms/libghostty-vt-macos-aarch64/
          retention-days: 1
          compression-level: 0

  build-macos-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-macos-0.15.2.tar.xz | tar xJ
          echo "${{ github.workspace }}/zig-x86_64-macos-0.15.2" >> $GITHUB_PATH

      - name: Install jextract
        run: |
          curl -L -o jextract.tar.gz "https://download.java.net/java/early_access/jextract/25/2/openjdk-${{ env.JEXTRACT_VERSION }}_macos-x64_bin.tar.gz"
          tar -xzf jextract.tar.gz
          echo "${{ github.workspace }}/${{ env.JEXTRACT_DIRNAME }}/bin" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Generate jextract bindings
        run: |
          mkdir -p ghostty/zig-out/artifact/macos-x86_64/src
          jextract \
            -I ghostty/zig-out/include \
            -t io.github.vlaaad.macos.x86_64 \
            --header-class-name ghostty_vt_h \
            --output ghostty/zig-out/artifact/macos-x86_64/src \
            ghostty/zig-out/include/ghostty/vt.h

      - name: Package
        run: |
          rm -rf dist/platforms/libghostty-vt-macos-x86_64
          mkdir -p dist/platforms/libghostty-vt-macos-x86_64/lib
          cp -R ghostty/zig-out/artifact/macos-x86_64/src dist/platforms/libghostty-vt-macos-x86_64/src
          test -f ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib
          cp ghostty/zig-out/lib/libghostty-vt.0.1.0.dylib dist/platforms/libghostty-vt-macos-x86_64/lib/libghostty-vt-macos-x86_64.dylib
          printf "jextract %s\n" "$(jextract --version | head -n 1)" > dist/platforms/libghostty-vt-macos-x86_64/metadata.txt

      - name: Test Java package
        run: mvn -B -pl ghostty-core,ghostty-macos-x86_64 -am test

      - uses: actions/upload-artifact@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-macos-x86_64
          path: dist/platforms/libghostty-vt-macos-x86_64/
          retention-days: 1
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    env:
      ZIG_LOCAL_CACHE_DIR: ${{ github.workspace }}\.zig-local-cache
      ZIG_GLOBAL_CACHE_DIR: ${{ github.workspace }}\.zig-global-cache
      TEMP: ${{ github.workspace }}\.tmp
      TMP: ${{ github.workspace }}\.tmp
    steps:
      - uses: actions/checkout@v5

      - uses: actions/checkout@v5
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Install Zig
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://ziglang.org/download/0.15.2/zig-x86_64-windows-0.15.2.zip" -OutFile zig.zip
          Expand-Archive -Path zig.zip -DestinationPath .
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\zig-x86_64-windows-0.15.2"

      - name: Install jextract
        shell: pwsh
        run: |
          Invoke-WebRequest -Uri "https://download.java.net/java/early_access/jextract/25/2/openjdk-${{ env.JEXTRACT_VERSION }}_windows-x64_bin.tar.gz" -OutFile jextract.tar.gz
          tar -xzf jextract.tar.gz
          Add-Content -Path $env:GITHUB_PATH -Value "${{ github.workspace }}\${{ env.JEXTRACT_DIRNAME }}\bin"

      - name: Prepare cache directories
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path $env:ZIG_LOCAL_CACHE_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:ZIG_GLOBAL_CACHE_DIR | Out-Null
          New-Item -ItemType Directory -Force -Path $env:TEMP | Out-Null

      - name: Build
        shell: pwsh
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Generate jextract bindings
        shell: pwsh
        run: |
          New-Item -ItemType Directory -Force -Path ghostty/zig-out/artifact/windows-x86_64/src | Out-Null
          jextract `
            -I ghostty/zig-out/include `
            -t io.github.vlaaad.windows.x86_64 `
            --header-class-name ghostty_vt_h `
            --output ghostty/zig-out/artifact/windows-x86_64/src `
            ghostty/zig-out/include/ghostty/vt.h

      - name: Package
        shell: pwsh
        run: |
          if (-not (Test-Path ghostty/zig-out/bin/ghostty-vt.dll)) {
            throw "Expected Windows shared library at ghostty/zig-out/bin/ghostty-vt.dll"
          }
          Remove-Item -Recurse -Force dist/platforms/libghostty-vt-windows-x86_64 -ErrorAction SilentlyContinue
          New-Item -ItemType Directory -Force -Path dist/platforms/libghostty-vt-windows-x86_64/lib | Out-Null
          Copy-Item -Recurse ghostty/zig-out/artifact/windows-x86_64/src dist/platforms/libghostty-vt-windows-x86_64/src
          Copy-Item ghostty/zig-out/bin/ghostty-vt.dll dist/platforms/libghostty-vt-windows-x86_64/lib/libghostty-vt-windows-x86_64.dll
          "jextract $(jextract --version | Select-Object -First 1)" | Set-Content dist/platforms/libghostty-vt-windows-x86_64/metadata.txt

      - name: Test Java package
        shell: pwsh
        run: mvn -B -pl ghostty-core,ghostty-windows-x86_64 -am test

      - uses: actions/upload-artifact@v6
        if: github.event_name == 'workflow_dispatch'
        with:
          name: libghostty-vt-windows-x86_64
          path: dist/platforms/libghostty-vt-windows-x86_64/
          retention-days: 1
          compression-level: 0
