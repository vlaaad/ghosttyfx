name: Build libghostty-vt

on:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-linux-0.15.2.tar.xz | tar xJ
          echo "${{ github.workspace }}/zig-x86_64-linux-0.15.2" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Package
        run: |
          cd ghostty/zig-out
          mkdir -p lib/linux-x64
          cp lib/libghostty-vt.so* lib/linux-x64/ 2>/dev/null || true
          cp lib/libghostty-vt.a lib/linux-x64/ 2>/dev/null || true
          cp -r include lib/linux-x64/
          cp lib/pkgconfig/*.pc lib/linux-x64/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: libghostty-vt-linux-x64
          path: ghostty/zig-out/lib/linux-x64/
          retention-days: 1

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-aarch64-macos-0.15.2.tar.xz | tar xJ
          echo "${{ github.workspace }}/zig-aarch64-macos-0.15.2" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Package
        run: |
          cd ghostty/zig-out
          mkdir -p lib/macos-arm64
          cp lib/libghostty-vt*.dylib lib/macos-arm64/ 2>/dev/null || true
          cp lib/libghostty-vt*.a lib/macos-arm64/ 2>/dev/null || true
          cp -r include lib/macos-arm64/
          cp lib/pkgconfig/*.pc lib/macos-arm64/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: libghostty-vt-macos-arm64
          path: ghostty/zig-out/lib/macos-arm64/
          retention-days: 1

  build-macos-x64:
    runs-on: macos-14
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - name: Install Zig
        run: |
          curl -L https://ziglang.org/download/0.15.2/zig-x86_64-macos-0.15.2.tar.xz | tar xJ
          echo "${{ github.workspace }}/zig-x86_64-macos-0.15.2" >> $GITHUB_PATH

      - name: Build
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Package
        run: |
          cd ghostty/zig-out
          mkdir -p lib/macos-x64
          cp lib/libghostty-vt*.dylib lib/macos-x64/ 2>/dev/null || true
          cp lib/libghostty-vt*.a lib/macos-x64/ 2>/dev/null || true
          cp -r include lib/macos-x64/
          cp lib/pkgconfig/*.pc lib/macos-x64/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: libghostty-vt-macos-x64
          path: ghostty/zig-out/lib/macos-x64/
          retention-days: 1

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
        with:
          repository: ghostty-org/ghostty
          path: ghostty

      - name: Setup Zig
        uses: mlugg/setup-zig@d1434d08867e3ee9daa34448df10607b98908d29

      - name: Build
        shell: bash
        run: |
          cd ghostty
          zig build -Dapp-runtime=none -Demit-lib-vt=true

      - name: Package
        shell: bash
        run: |
          cd ghostty/zig-out
          mkdir -p lib/windows-x64
          cp lib/*.dll lib/windows-x64/ 2>/dev/null || true
          cp lib/*.lib lib/windows-x64/ 2>/dev/null || true
          cp -r include lib/windows-x64/
          cp lib/pkgconfig/*.pc lib/windows-x64/ 2>/dev/null || true

      - uses: actions/upload-artifact@v4
        with:
          name: libghostty-vt-windows-x64
          path: ghostty/zig-out/lib/windows-x64/
          retention-days: 1
