name: Build ghosttyfx

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Test
        run: mvn -B clean test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: ghosttyfx-linux-x86_64
          path: ghosttyfx-linux-x86_64/target/ghosttyfx-artifact/
          retention-days: 1
          compression-level: 0

  build-macos-arm64:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Test
        run: mvn -B clean test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: ghosttyfx-macos-aarch64
          path: ghosttyfx-macos-aarch64/target/ghosttyfx-artifact/
          retention-days: 1
          compression-level: 0

  build-macos-x64:
    runs-on: macos-15-intel
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Test
        run: mvn -B clean test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: ghosttyfx-macos-x86_64
          path: ghosttyfx-macos-x86_64/target/ghosttyfx-artifact/
          retention-days: 1
          compression-level: 0

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@93cb6efe18208431cddfb8368fd83d5badbf9bfd # v5.0.1
        with:
          submodules: recursive

      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "25"
          cache: maven

      - name: Test
        run: mvn -B clean test

      - uses: actions/upload-artifact@b7c566a772e6b6bfb58ed0dc250532a479d7789f # v6.0.0
        if: github.event_name == 'workflow_dispatch'
        with:
          name: ghosttyfx-windows-x86_64
          path: ghosttyfx-windows-x86_64/target/ghosttyfx-artifact/
          retention-days: 1
          compression-level: 0
